<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Zhu Store Food Manager</title>

<style>
body {
  font-family: Arial;
  background: #f6f6f6;
  padding: 15px;
}

.header {
  background: #dfead5;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}
  
.subtitle {
  font-size: 13px;
  color: #666;
  margin-top: 5px;
}

.stats {
  background: #f3f3f3;
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
}

.search {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

.category {
  background: #e7d8b1;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.thumb {
  width: 55px;
  height: 55px;
  border-radius: 10px;
  background: #eee;
  display: flex;
  align-item: center;
  justift-content: center;
}
  
.thumb img {
  width: 100%
  height: 100%
  object-fit: contain;
}
  
.info {
  flex: 1;
}

.level, .stock {
  font-size: 12px;
  color: #888;
}

.controls {
  display: flex;
  gap: 5px;
}

button {
  padding: 5px 8px;
  border-radius: 6px;
  border: none;
  background: #d9e5c3;
}

.cart {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
  <h2>💫 Zhu Store Food Order 💫</h2>
  <div class="subtitle">🌾Fresh Food - Fast Delivery - Best Price🌾</div>
</div>

<div class="stats">
  📦 Total Food: <span id="totalFood"></span> |
  ⭐ Max Level: <span id="maxLevel"></span> |
  🛒 Dipilih: <span id="totalSelected"></span>
</div>

<input class="search" placeholder="🔍 Cari..." onkeyup="render()">

<div id="app"></div>

<div class="cart">
  <b>🛒 Keranjang</b>
  <pre id="cartList">Kosong</pre>
  📦 Total Item: <span id="totalSelectedCart">0</span><br><br>
  <button onclick="copyList()">📋 Salin List (Pakai Stock)</button>
</div>

<script>
let data = [
{
  name: "Bakery",
  open: true,
  items: [
    {name:"Bread", level:2, stock:500, img:"img/bread.png"}, 
    {name:"Corn Bread", level:13, stock:80, img:"img/cornbread.png"},
    {name:"Cookie", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Raspberry Muffin", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Blackberry Muffin", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Pizza", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Blueberry Muffin", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Spicy Pizza", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Potato Bread", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Frutti Di Mare Pizza", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Gingerbread Cookie", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Banana Bread", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Macaroon", level:13, stock:80, img:"img/whitesugar.png"},
  ]
},
{
  name: "Dairy",
  open: false,
  items: [
    {name:"Cream", level:15, stock:50, img:"img/chicken.png"},
    {name:"Butter", level:20, stock:40, img:"img/steak.png"},
    {name:"Cheese", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Goat Cheese", level:13, stock:80, img:"img/whitesugar.png"},
  ]
},
{
  name: "Sugar Mill",
  open: true,
  items: [
    {name:"Brown Sugar", level:7, stock:100, img:"img/brownsugar.png"},
    {name:"White Sugar", level:13, stock:80, img:"img/whitesugar.png"},
    {name:"Syrup", level:13, stock:80, img:"img/whitesugar.png"},
  ]
} 
];

let cart = {};

function toggle(i){
  data[i].open = !data[i].open;
  render();
}

function add(i,j){
  let item = data[i].items[j];
  let key = i+"-"+j;

  if(item.stock >= 10){
    cart[key] = (cart[key]||0)+10;
    item.stock -= 10; // 🔥 langsung kurang
  }

  render();
}

function remove(i,j){
  let item = data[i].items[j];
  let key = i+"-"+j;

  if(cart[key] > 0){
    cart[key] -= 10;
    item.stock += 10; // balikin stock
  }

  render();
}

function getQty(i,j){
  return cart[i+"-"+j] || 0;
}

function copyList(){
  let text = document.getElementById("cartList").innerText;
  navigator.clipboard.writeText(text);
  alert("List disalin & stock sudah dipakai!");
}

function render(){
  let q = document.querySelector(".search").value.toLowerCase();
  let html = "";

  data.forEach((cat,i)=>{
    html += `<div class="category" onclick="toggle(${i})">📦 ${cat.name}</div>`;

    if(cat.open){
      cat.items.forEach((item,j)=>{
        if(item.name.toLowerCase().includes(q)){
          html += `
          <div class="item">
            <img src="${item.img}" class="thumb">

            <div class="info">
              <div><b>${item.name}</b></div>
              <div class="level">⭐ Lv. ${item.level}</div>
              <div class="stock">🧰 Stock: ${item.stock}</div>
            </div>

            <div class="controls">
              <button onclick="remove(${i},${j})">-10</button>
              <div>${getQty(i,j)}</div>
              <button onclick="add(${i},${j})">+10</button>
            </div>
          </div>
          `;
        }
      });
    }
  });

  document.getElementById("app").innerHTML = html;

  let cartHTML = "";
  let totalFood = 0;
  let maxLevel = 0;
  let totalSelected = 0;

  data.forEach((cat,i)=>{
    cat.items.forEach((item,j)=>{
      totalFood++;
      if(item.level > maxLevel) maxLevel = item.level;

      let qty = getQty(i,j);
      totalSelected += qty;

      if(qty > 0){
        cartHTML += `• ${item.name} x${qty}\n`;
      }
    });
  });

  document.getElementById("cartList").innerText = cartHTML || "Kosong";
  document.getElementById("totalFood").innerText = totalFood;
  document.getElementById("maxLevel").innerText = maxLevel;
  document.getElementById("totalSelected").innerText = totalSelected;
  document.getElementById("totalSelectedCart").innerText = totalSelected;
}

render();
</script>

</body>
</html>
