<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhu EC Foodlist</title>

<style>
body {
  font-family: sans-serif;
  background: #f9fafb;
  padding: 15px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* CATEGORY */
.category {
  background: #f3e7d3;
  padding: 12px;
  border-radius: 12px;
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* LEVEL BADGE */
.lvl {
  font-size: 12px;
  background: #e5e7eb;
  padding: 4px 8px;
  border-radius: 8px;
  font-weight: bold;
}

/* SUB ITEM */
.sub {
  margin-left: 5px;
}

.sub-item {
  background: white;
  padding: 8px;
  border-radius: 10px;
  margin: 6px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* IMAGE */
.thumb {
  width: 50px;
  height: 50px;
  border-radius: 8px;
  object-fit: cover;
  background: #eee;
}

/* INFO */
.info {
  flex: 1;
}

.price {
  font-size: 12px;
  color: #666;
}

/* BUTTON */
button {
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.qty {
  margin: 0 6px;
}

/* CART */
.cart {
  margin-top: 20px;
  padding: 12px;
  background: #e5f3ff;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>🛒 Food List</h2>

<input type="text" id="search" placeholder="Cari makanan...">

<div id="list"></div>

<div class="cart">
  <h3>Keranjang</h3>
  <div id="cart"></div>
  <h3>Total: Rp <span id="total">0</span></h3>
</div>

<script>
let openIndex = null;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const categories = [
  {
    name: "🔥 BBQ Grill",
    level: 5,
    items: [
      { name: "Grilled Steak", price: 2000, img: "img/steak.jpg" },
      { name: "BBQ Chicken", price: 1800, img: "img/bbq.jpg" }
    ]
  },
  {
    name: "🥧 Pie Oven",
    level: 3,
    items: [
      { name: "Apple Pie", price: 1500, img: "img/pie.jpg" },
      { name: "Berry Pie", price: 1600, img: "img/pie2.jpg" }
    ]
  },
  {
    name: "🧃 Juice Press",
    level: 6,
    items: [
      { name: "Orange Juice", price: 1200, img: "img/juice.jpg" },
      { name: "Berry Juice", price: 1300, img: "img/juice2.jpg" }
    ]
  }
];

function render() {
  const list = document.getElementById("list");
  const keyword = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";

  categories.forEach((cat, i) => {
    let div = document.createElement("div");

    div.innerHTML = `
      <div class="category" onclick="toggle(${i})">
        ${cat.name}
        <span class="lvl">Lv. ${cat.level}</span>
      </div>

      <div class="sub" style="display:${openIndex === i ? 'block' : 'none'}">
        ${
          cat.items
          .filter(item => item.name.toLowerCase().includes(keyword))
          .map((item, j) => `
            <div class="sub-item">
              
              <img src="${item.img}" class="thumb">

              <div class="info">
                <div>${item.name}</div>
                <div class="price">Rp ${item.price}</div>
              </div>

              <div>
                <button onclick="add(${i},${j})">+</button>
                <span class="qty">${getQty(i,j)}</span>
                <button onclick="remove(${i},${j})">-</button>
              </div>

            </div>
          `).join("")
        }
      </div>
    `;

    list.appendChild(div);
  });

  renderCart();
}

function toggle(i) {
  openIndex = openIndex === i ? null : i;
  render();
}

function getQty(i, j) {
  let item = cart.find(x => x.cat === i && x.item === j);
  return item ? item.qty : 0;
}

function add(i, j) {
  let item = cart.find(x => x.cat === i && x.item === j);

  if (item) item.qty++;
  else cart.push({ cat: i, item: j, qty: 1 });

  save();
}

function remove(i, j) {
  let item = cart.find(x => x.cat === i && x.item === j);
  if (!item) return;

  item.qty--;
  if (item.qty <= 0) {
    cart = cart.filter(x => !(x.cat === i && x.item === j));
  }

  save();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";

  let total = 0;

  cart.forEach(c => {
    let item = categories[c.cat].items[c.item];
    total += item.price * c.qty;

    cartDiv.innerHTML += `<div>${item.name} x ${c.qty}</div>`;
  });

  document.getElementById("total").innerText = total;
}

function save() {
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
}

document.getElementById("search").addEventListener("input", render);

render();
</script>

</body>
</html>
