<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Food List</title>

<style>
body {
  font-family: Arial;
  background: #f6f6f6;
  padding: 15px;
}

.search {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

.category {
  background: #e7d8b1;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
  cursor: pointer;
  font-weight: bold;
}

.sub {
  display: none;
  margin-top: 10px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* GAMBAR */
.thumb {
  width: 55px;
  height: 55px;
  border-radius: 10px;
  object-fit: cover;
  background: #eee;
}

/* INFO */
.info {
  flex: 1;
}

.name {
  font-weight: bold;
}

.level {
  font-size: 12px;
  color: #888;
  margin: 2px 0;
}

.price {
  font-size: 13px;
}

/* BUTTON */
.controls {
  display: flex;
  align-items: center;
  gap: 5px;
}

button {
  padding: 5px 8px;
  border-radius: 6px;
  border: none;
  background: #d9e5c3;
  cursor: pointer;
}

.qty {
  min-width: 20px;
  text-align: center;
}
</style>
</head>

<body>

<input type="text" class="search" placeholder="🔍 Cari food..." onkeyup="render()">

<div id="app"></div>

<script>
let data = [
{
  name: "Sugar Mill",
  open: false,
  items: [
    {
      name: "Brown Sugar",
      level: 7,
      price: 500,
      img: "img/brownsugar.png"
    },
    {
      name: "White Sugar",
      level: 13,
      price: 500,
      img: "img/whitesugar.png"
    },
    {
      name: "Syrup",
      level: 18,
      price: 700,
      img: "img/syrup.png"
    }
  ]
}
];

let cart = {};

function toggle(i){
  data[i].open = !data[i].open;
  render();
}

function add(i,j){
  let key = i+"-"+j;
  cart[key] = (cart[key]||0)+10;
  render();
}

function remove(i,j){
  let key = i+"-"+j;
  cart[key] = (cart[key]||0)-10;
  if(cart[key] < 0) cart[key] = 0;
  render();
}

function getQty(i,j){
  return cart[i+"-"+j] || 0;
}

function render(){
  let q = document.querySelector(".search").value.toLowerCase();
  let html = "";

  data.forEach((cat,i)=>{
    html += `
      <div class="category" onclick="toggle(${i})">
        📦 ${cat.name}
      </div>
    `;

    if(cat.open){
      html += `<div class="sub">`;

      cat.items.forEach((item,j)=>{

        if(item.name.toLowerCase().includes(q)){

          html += `
          <div class="item">

            <img src="${item.img}" class="thumb">

            <div class="info">
              <div class="name">${item.name}</div>
              <div class="level">⭐ Lv. ${item.level}</div>
              <div class="price">🪙 ${item.price}</div>
            </div>

            <div class="controls">
              <button onclick="remove(${i},${j})">-10</button>
              <div class="qty">${getQty(i,j)}</div>
              <button onclick="add(${i},${j})">+10</button>
            </div>

          </div>
          `;
        }

      });

      html += `</div>`;
    }

  });

  document.getElementById("app").innerHTML = html;
}

render();
</script>

</body>
</html>
