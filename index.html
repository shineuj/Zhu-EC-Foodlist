<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Zhu EC Foodlist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
    }

    header {
      text-align: center;
      padding: 20px 10px 10px;
    }

    header h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 600;
    }

    header p {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 12px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    .info {
      padding: 8px;
    }

    .name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .price {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 6px;
      background: #111;
      color: white;
      font-size: 11px;
      border-radius: 6px;
      text-decoration: none;
    }

    footer {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>ZhuStore Foodlist</h1>
  <p>klik untuk order ✦</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div class="name">Burger</div>
      <div class="price">Rp5.000</div>
      <a class="btn" href="https://wa.me/628XXXXXXXXXX">Order</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div class="name">Pizza</div>
      <div class="price">Rp6.000</div>
      <a class="btn" href="https://wa.me/628XXXXXXXXXX">Order</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div class="name">Cola</div>
      <div class="price">Rp4.000</div>
      <a class="btn" href="https://wa.me/628XXXXXXXXXX">Order</a>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div class="name">Strawberry</div>
      <div class="price">Rp5.500</div>
      <a class="btn" href="https://wa.me/628XXXXXXXXXX">Order</a>
    </div>
  </div>

</div>

<footer>
  © Zhu EC Store
</footer>

</body>
</html>
