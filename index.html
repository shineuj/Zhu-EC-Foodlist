body {

.header {

}
  
.subtitle {
  font-size: 13px;
  color: #666;

.stats {

}

.search {

  padding: 10px;
  border-radius: 20px;

.category {

.item {
  background: white;

  align-items: center;
  gap: 10px;
}
  
.thumb {

  height: 55px;
  border-radius: 10px;
  background: #eee;
  display: flex;
  align-item: center;
  justify-content: center;
}
  
.thumb img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
  
.info {
  flex: 1;
}

.level, .stock {
  font-size: 12px;
  color: #888;
}

.controls {
  display: flex;
  gap: 5px;
}

button {
  padding: 5px 8px;
  border-radius: 6px;
  border: none;
  background: #d9e5c3;
}

.cart {
  background: white;
  padding: 10px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>

let cart = {};

function toggle(i){
  data[i].open = !data[i].open;
  render();
}

function add(i,j){
  let item = data[i].items[j];
  let key = i+"-"+j;

  if(item.stock >= 10){
    cart[key] = (cart[key]||0)+10;
    item.stock -= 10; // 🔥 langsung kurang
  }

  render();
}

function remove(i,j){
  let item = data[i].items[j];
  let key = i+"-"+j;

  if(cart[key] > 0){
    cart[key] -= 10;
    item.stock += 10; // balikin stock
  }

  render();
}

function getQty(i,j){
  return cart[i+"-"+j] || 0;
}

function copyList(){
  let text = document.getElementById("cartList").innerText;
  navigator.clipboard.writeText(text);
  alert("List disalin & stock sudah dipakai!");
}

function render(){
  let q = document.querySelector(".search").value.toLowerCase();
  let html = "";

  data.forEach((cat, i) => {
    html += `
    <div class="category" onclick="toggle(${i})">
        <img src="${cat.icon}" class="cat-icon">
        ${cat.name}
    </div>`;

    if(cat.open){
      cat.items.forEach((item,j)=>{
        if(item.name.toLowerCase().includes(q)){
          html += `
          <div class="item">
            <img src="${item.img}" class="thumb">

            <div class="info">
              <div><b>${item.name}</b></div>
              <div class="level">⭐ Lv. ${item.level}</div>
              <div class="stock">🧰 Stock: ${item.stock}</div>
            </div>

            <div class="controls">
              <button onclick="remove(${i},${j})">-10</button>
              <div>${getQty(i,j)}</div>
              <button onclick="add(${i},${j})">+10</button>
            </div>
          </div>
          `;
        }
      });
    }
  });

  document.getElementById("app").innerHTML = html;

  let cartHTML = "";
  let totalFood = 0;
  let maxLevel = 0;
  let totalSelected = 0;

  data.forEach((cat,i)=>{
    cat.items.forEach((item,j)=>{
      totalFood++;
      if(item.level > maxLevel) maxLevel = item.level;

      let qty = getQty(i,j);
      totalSelected += qty;

      if(qty > 0){
        cartHTML += `• ${item.name} x${qty}\n`;
      }
    });
  });

  document.getElementById("cartList").innerText = cartHTML || "Kosong";
  document.getElementById("totalFood").innerText = totalFood;
  document.getElementById("maxLevel").innerText = maxLevel;
  document.getElementById("totalSelected").innerText = totalSelected;
  document.getElementById("totalSelectedCart").innerText = totalSelected;
}

render();
</script>
