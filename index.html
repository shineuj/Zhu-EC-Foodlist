<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhu EC Foodlist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: Inter; margin:0; background:#fafafa; }

header { text-align:center; padding:15px; }

input {
  width:90%; padding:8px;
  border-radius:8px; border:1px solid #ddd;
}

.categories {
  display:flex; gap:8px;
  overflow-x:auto; padding:10px;
}

.cat-btn {
  padding:6px 10px;
  border:1px solid #ddd;
  border-radius:20px;
  background:white;
  font-size:12px;
}

.container {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:12px;
}

.card {
  background:white;
  border-radius:12px;
  border:1px solid #eee;
  overflow:hidden;
}

.card img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.info { padding:8px; }

.qty {
  display:flex;
  justify-content:center;
  gap:5px;
  margin:5px 0;
}

.qty button { font-size:10px; }

.cart {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  border-top:1px solid #ddd;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart button {
  background:#111;
  color:white;
  padding:8px 12px;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <h3>Zhu EC Store</h3>
  <input type="text" id="search" placeholder="Search...">
</header>

<div class="categories">
  <div class="cat-btn" onclick="filterCategory('all')">All</div>
  <div class="cat-btn" onclick="filterCategory('candy')">Candy</div>
  <div class="cat-btn" onclick="filterCategory('drink')">Drink</div>
</div>

<div class="container">

  <!-- ITEM -->
  <div class="card" data-name="Burger" data-cat="candy" data-price="5000">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div>Burger</div>
      <div>Rp5.000</div>

      <div class="qty">
        <button onclick="changeQty(this,-10)">-10</button>
        <button onclick="changeQty(this,-1)">-</button>
        <span>0</span>
        <button onclick="changeQty(this,1)">+</button>
        <button onclick="changeQty(this,10)">+10</button>
      </div>
    </div>
  </div>

  <div class="card" data-name="Cola" data-cat="drink" data-price="4000">
    <img src="https://via.placeholder.com/300">
    <div class="info">
      <div>Cola</div>
      <div>Rp4.000</div>

      <div class="qty">
        <button onclick="changeQty(this,-10)">-10</button>
        <button onclick="changeQty(this,-1)">-</button>
        <span>0</span>
        <button onclick="changeQty(this,1)">+</button>
        <button onclick="changeQty(this,10)">+10</button>
      </div>
    </div>
  </div>

</div>

<!-- CART -->
<div class="cart">
  <div id="total">Total: Rp0</div>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
function changeQty(btn,val){
  let span = btn.parentElement.querySelector("span");
  let qty = parseInt(span.innerText) + val;
  if(qty < 0) qty = 0;
  span.innerText = qty;
  updateTotal();
}

function updateTotal(){
  let total = 0;
  document.querySelectorAll(".card").forEach(card=>{
    let qty = parseInt(card.querySelector("span").innerText);
    let price = card.dataset.price;
    total += qty * price;
  });
  document.getElementById("total").innerText = "Total: Rp" + total;
}

function checkout(){
  let text = "Order:%0A";
  let hasItem = false;

  document.querySelectorAll(".card").forEach(card=>{
    let name = card.dataset.name;
    let qty = parseInt(card.querySelector("span").innerText);

    if(qty > 0){
      hasItem = true;
      text += "- " + name + " x" + qty + "%0A";
    }
  });

  if(!hasItem){
    alert("Belum pilih item");
    return;
  }

  let url = "https://wa.me/628XXXXXXXXXX?text=" + text;
  window.open(url, "_blank");
}

function filterCategory(cat){
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = (cat==='all'||card.dataset.cat===cat) ? "block":"none";
  });
}

document.getElementById("search").addEventListener("input", function(){
  let val = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    let name = card.dataset.name.toLowerCase();
    card.style.display = name.includes(val) ? "block":"none";
  });
});
</script>

</body>
</html>
